name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to publish (example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release (${{ matrix.label }})
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - label: linux-x86_64
            platform: linux
            runner: ubuntu-24.04
            bundles: appimage,deb,rpm
          - label: linux-arm64
            platform: linux
            runner: ubuntu-24.04-arm
            bundles: appimage,deb,rpm
          - platform: macos
            label: macos-arm64
            runner: macos-latest
            bundles: app,dmg
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout selected tag (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: git checkout "refs/tags/${{ steps.release.outputs.tag }}"

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate release version consistency
        shell: bash
        run: |
          set -euo pipefail

          tag_version="${{ steps.release.outputs.tag }}"
          tag_version="${tag_version#v}"
          package_version="$(node -p "require('./frontend/package.json').version")"
          tauri_version="$(node -p "require('./frontend/src-tauri/tauri.conf.json').version")"
          cargo_version="$(node -e "const fs = require('fs'); const cargoToml = fs.readFileSync('./frontend/src-tauri/Cargo.toml', 'utf8'); const match = cargoToml.match(/^version = \"([^\"]+)\"$/m); if (!match) { process.exit(1); } console.log(match[1]);")"

          echo "Resolved tag version: ${tag_version}"
          echo "package.json version: ${package_version}"
          echo "tauri.conf.json version: ${tauri_version}"
          echo "Cargo.toml version: ${cargo_version}"

          if [ "${package_version}" != "${tag_version}" ] || [ "${tauri_version}" != "${tag_version}" ] || [ "${cargo_version}" != "${tag_version}" ]; then
            echo "Release version mismatch detected." >&2
            exit 1
          fi

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build and publish desktop artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          args: --bundles ${{ matrix.bundles }}
          tagName: ${{ steps.release.outputs.tag }}
          releaseName: "Report Generator ${{ steps.release.outputs.tag }}"
          releaseBody: "Automated desktop release for ${{ steps.release.outputs.tag }}"
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
